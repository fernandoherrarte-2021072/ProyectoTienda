<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos | Sistema de Ventas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/entidades.css?v=2.2}">

    <style>
        .selected-row {
            background-color: #2d3a54 !important;
            border-color: var(--accent-blue) !important;
            transform: scale(1.01);
        }

        tr { transition: all 0.2s ease; }

        .badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-stock { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid #3b82f6; }
        .badge-available { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; }
        .badge-out { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestión de Productos</h2>

    <div class="form">
        <input id="codigoProducto" type="number" placeholder="ID (Autogenerado)" readonly style="opacity: 0.6; cursor: not-allowed;">
        <input id="nombreProducto" type="text" placeholder="Nombre del Producto">
        <input id="precio" type="number" step="0.01" placeholder="Precio (Q 0.00)">
        <input id="stock" type="number" placeholder="Stock disponible">
        <input id="estado" type="number" placeholder="Estado (1=Disponible / 0=Agotado)">

        <div class="form-actions">
            <button class="btn-add" onclick="agregar()">Agregar</button>
            <button class="btn-edit" onclick="editar()">Editar</button>
            <button class="btn-delete" onclick="eliminar()">Eliminar</button>
            <button type="button" onclick="limpiar()">Limpiar</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>

    <div style="margin-top: 40px; text-align: center;">
        <a th:href="@{/home}" style="color: var(--accent-blue); text-decoration: none; font-weight: 700; font-family: 'Plus Jakarta Sans';">
            ← Volver al Panel Principal
        </a>
    </div>
</div>

<script>
    let productoSeleccionado = null;

    // --- Listar ---
    async function cargar() {
        try {
            const res = await fetch("/api/productos");
            const data = await res.json();

            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(p => {
                const tr = document.createElement("tr");
                tr.style.cursor = "pointer";
                tr.onclick = function() {
                    seleccionar(this, p.codigoProducto, p.nombreProducto, p.precio, p.stock, p.estado);
                };

                const estadoHTML = p.estado == 1
                    ? '<span class="badge badge-available">Disponible</span>'
                    : '<span class="badge badge-out">Agotado</span>';

                tr.innerHTML = `
                    <td>#${p.codigoProducto}</td>
                    <td><strong>${p.nombreProducto}</strong></td>
                    <td style="color: #10b981; font-weight: 600;">Q ${parseFloat(p.precio).toFixed(2)}</td>
                    <td><span class="badge badge-stock">${p.stock} unid.</span></td>
                    <td>${estadoHTML}</td>
                `;
                tabla.appendChild(tr);
            });
        } catch (error) {
            console.error("Error al cargar productos:", error);
        }
    }

    // --- Seleccionar ---
    function seleccionar(elemento, id, nombre, precio, stock, estado) {
        document.querySelectorAll("tr").forEach(row => row.classList.remove("selected-row"));
        elemento.classList.add("selected-row");

        productoSeleccionado = id;
        document.getElementById("codigoProducto").value = id;
        document.getElementById("nombreProducto").value = nombre;
        document.getElementById("precio").value = precio;
        document.getElementById("stock").value = stock;
        document.getElementById("estado").value = estado;
    }

    // --- Limpiar ---
    function limpiar() {
        productoSeleccionado = null;
        document.querySelectorAll(".form input").forEach(i => i.value = "");
        document.querySelectorAll("tr").forEach(row => row.classList.remove("selected-row"));
    }

    // --- agregar---
    async function agregar() {
        const producto = {
            nombreProducto: document.getElementById("nombreProducto").value,
            precio: parseFloat(document.getElementById("precio").value),
            stock: parseInt(document.getElementById("stock").value),
            estado: parseInt(document.getElementById("estado").value || 1)
        };

        if(!producto.nombreProducto || isNaN(producto.precio)) {
            alert(" Nombre y Precio son obligatorios");
            return;
        }

        await fetch("/api/productos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(producto)
        });

        limpiar();
        cargar();
    }

    // --- EDITAR (PUT) ---
    async function editar() {
        if (!productoSeleccionado) {
            alert("Selecciona un producto de la tabla");
            return;
        }

        const producto = {
            codigoProducto: productoSeleccionado,
            nombreProducto: document.getElementById("nombreProducto").value,
            precio: parseFloat(document.getElementById("precio").value),
            stock: parseInt(document.getElementById("stock").value),
            estado: parseInt(document.getElementById("estado").value)
        };

        await fetch(`/api/productos/${productoSeleccionado}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(producto)
        });

        limpiar();
        cargar();
    }

    // --- ELIMINAR (DELETE) ---
    async function eliminar() {
        if (!productoSeleccionado) {
            alert(" Selecciona un producto para eliminar");
            return;
        }

        if (confirm(`¿Eliminar producto: ${document.getElementById("nombreProducto").value}?`)) {
            await fetch(`/api/productos/${productoSeleccionado}`, {
                method: "DELETE"
            });
            limpiar();
            cargar();
        }
    }

    cargar();
</script>

</body>
</html>
