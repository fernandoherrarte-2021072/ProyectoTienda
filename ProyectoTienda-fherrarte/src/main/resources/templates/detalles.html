<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Detalle de Ventas | Sistema de Ventas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/entidades.css?v=2.2}">

  <style>
    .selected-row {
        background-color: #2d3a54 !important;
        border-color: var(--accent-blue) !important;
        transform: scale(1.01);
    }

    tr { transition: all 0.2s ease; }

    .badge-id {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 0.8rem;
    }

    .subtotal-cell {
        color: #10b981;
        font-weight: 700;
        font-size: 1rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Detalle de Ventas</h2>

  <div class="form">
    <input id="codigoDetalle" type="number" placeholder="ID Detalle" readonly style="opacity: 0.6; cursor: not-allowed;">
    <input id="codigoVenta" type="number" placeholder="No. de Venta">
    <input id="codigoProducto" type="number" placeholder="No. de Producto">
    <input id="cantidad" type="number" placeholder="Cantidad">
    <input id="precioUnitario" type="number" step="0.01" placeholder="Precio Unitario (Q)">

    <div class="form-actions">
      <button type="button" class="btn-add" onclick="agregar()">Agregar</button>
      <button type="button" class="btn-edit" onclick="editar()">Editar</button>
      <button type="button" class="btn-delete" onclick="eliminar()">Eliminar</button>
      <button type="button" onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Venta</th>
      <th>Producto</th>
      <th>Cantidad</th>
      <th>Precio Unit.</th>
      <th>Subtotal</th>
    </tr>
    </thead>
    <tbody id="tabla">
    </tbody>
  </table>

  <div style="margin-top: 40px; text-align: center;">
    <a th:href="@{/home}" style="color: var(--accent-blue); text-decoration: none; font-weight: 700; font-family: 'Plus Jakarta Sans';">
      ← Volver al Panel Principal
    </a>
  </div>
</div>

<script>
  let detalleSeleccionado = null;

  const inpDetalle  = document.getElementById("codigoDetalle");
  const inpVenta    = document.getElementById("codigoVenta");
  const inpProducto = document.getElementById("codigoProducto");
  const inpCantidad = document.getElementById("cantidad");
  const inpPrecio   = document.getElementById("precioUnitario");

  // --- LISTAR ---
  async function cargar() {
      try {
          const res = await fetch("/api/detalle-ventas");
          const data = await res.json();

          const tabla = document.getElementById("tabla");
          tabla.innerHTML = "";

          data.forEach(d => {
              const tr = document.createElement("tr");
              tr.style.cursor = "pointer";
              tr.onclick = function() {
                  seleccionar(this, d.codigoDetalleVenta, d.codigoVenta, d.codigoProducto, d.cantidad, d.precioUnitario);
              };

              tr.innerHTML = `
                  <td><span class="badge-id">#${d.codigoDetalleVenta}</span></td>
                  <td>Venta #${d.codigoVenta}</td>
                  <td>Prod #${d.codigoProducto}</td>
                  <td>${d.cantidad}</td>
                  <td>Q ${parseFloat(d.precioUnitario).toFixed(2)}</td>
                  <td class="subtotal-cell">Q ${parseFloat(d.subtotal).toFixed(2)}</td>
              `;
              tabla.appendChild(tr);
          });
      } catch (error) {
          console.error("Error al cargar detalles:", error);
      }
  }

  // --- SELECCIONAR ---
  function seleccionar(elemento, id, venta, producto, cantidad, precio) {
      document.querySelectorAll("tr").forEach(row => row.classList.remove("selected-row"));
      elemento.classList.add("selected-row");

      detalleSeleccionado = id;
      inpDetalle.value = id;
      inpVenta.value = venta;
      inpProducto.value = producto;
      inpCantidad.value = cantidad;
      inpPrecio.value = precio;
  }

  // --- AGREGAR (POST) ---
  async function agregar() {
      const detalle = {
          codigoVenta: parseInt(inpVenta.value),
          codigoProducto: parseInt(inpProducto.value),
          cantidad: parseInt(inpCantidad.value),
          precioUnitario: parseFloat(inpPrecio.value)
      };

      if(!detalle.codigoVenta || !detalle.cantidad) {
          alert("Por favor completa los campos de Venta y Cantidad");
          return;
      }

      const response = await fetch("/api/detalle-ventas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(detalle)
      });

      if (response.ok) {
          limpiar();
          cargar();
      } else {
          const txt = await response.text();
          alert("Error: " + txt);
      }
  }

  // --- EDITAR (PUT) ---
  async function editar() {
      if (!detalleSeleccionado) {
          alert("Selecciona un detalle de la tabla");
          return;
      }

      const detalle = {
          codigoDetalleVenta: detalleSeleccionado,
          codigoVenta: parseInt(inpVenta.value),
          codigoProducto: parseInt(inpProducto.value),
          cantidad: parseInt(inpCantidad.value),
          precioUnitario: parseFloat(inpPrecio.value)
      };

      await fetch(`/api/detalle-ventas/${detalleSeleccionado}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(detalle)
      });

      limpiar();
      cargar();
  }

  // --- ELIMINAR (DELETE) ---
  async function eliminar() {
      if (!detalleSeleccionado) {
          alert("Porfavor selecciona un detalle para eliminar");
          return;
      }

      if (confirm("¿Seguro que deseas eliminar este renglón de la venta?")) {
          await fetch(`/api/detalle-ventas/${detalleSeleccionado}`, {
              method: "DELETE"
          });
          limpiar();
          cargar();
      }
  }

  // --- LIMPIAR ---
  function limpiar() {
      detalleSeleccionado = null;
      document.querySelectorAll("tr").forEach(row => row.classList.remove("selected-row"));
      inpDetalle.value = "";
      inpVenta.value = "";
      inpProducto.value = "";
      inpCantidad.value = "";
      inpPrecio.value = "";
  }

  cargar();
</script>

</body>
</html>
