<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" href="/css/entidades.css">
</head>
<body>

<div class="container">

    <h2>Gestión de Productos</h2>

    <!-- FORMULARIO -->
    <div class="form">
        <input id="codigoProducto" type="number" placeholder="Código (solo editar)">
        <input id="nombreProducto" type="text" placeholder="Nombre">
        <input id="precio" type="number" step="0.01" placeholder="Precio">
        <input id="stock" type="number" placeholder="Stock">
        <input id="estado" type="number" placeholder="Estado (1=Disponible, 0=Agotado)">

        <div style="margin-top:10px">
            <button class="btn-add" onclick="agregar()">Agregar</button>
            <button class="btn-edit" onclick="editar()">Editar</button>
            <button class="btn-delete" onclick="eliminar()">Eliminar</button>
            <button onclick="limpiar()">Limpiar</button>
        </div>
    </div>

    <hr>

    <!-- TABLA -->
    <table>
        <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

    <br>
    <a href="/home">Volver al Home</a>
</div>

<script>
    let productoSeleccionado = null;

    // LISTAR
    async function cargar() {
        const res = await fetch("/api/productos");
        const data = await res.json();

        const tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        data.forEach(p => {
            tabla.innerHTML += `
                <tr onclick="seleccionar(${p.codigoProducto},
                                         '${p.nombreProducto}',
                                         ${p.precio},
                                         ${p.stock},
                                         ${p.estado})"
                    style="cursor:pointer">
                    <td>${p.codigoProducto}</td>
                    <td>${p.nombreProducto}</td>
                    <td>Q ${p.precio}</td>
                    <td>${p.stock}</td>
                    <td>${p.estado == 1 ? 'Disponible' : 'Agotado'}</td>
                </tr>
            `;
        });
    }

    function seleccionar(id, nombre, precio, stock, estado) {
        productoSeleccionado = id;
        document.getElementById("codigoProducto").value = id;
        document.getElementById("nombreProducto").value = nombre;
        document.getElementById("precio").value = precio;
        document.getElementById("stock").value = stock;
        document.getElementById("estado").value = estado;
    }

    function limpiar() {
        productoSeleccionado = null;
        document.querySelectorAll(".form input").forEach(i => i.value = "");
    }

    // POST
    async function agregar() {
        const producto = {
            nombreProducto: document.getElementById("nombreProducto").value,
            precio: document.getElementById("precio").value,
            stock: document.getElementById("stock").value,
            estado: document.getElementById("estado").value
        };

        await fetch("/api/productos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(producto)
        });

        limpiar();
        cargar();
    }

    // PUT
    async function editar() {
        if (!productoSeleccionado) {
            alert("Selecciona un producto");
            return;
        }

        const producto = {
            codigoProducto: productoSeleccionado,
            nombreProducto: document.getElementById("nombreProducto").value,
            precio: document.getElementById("precio").value,
            stock: document.getElementById("stock").value,
            estado: document.getElementById("estado").value
        };

        await fetch(`/api/productos/${productoSeleccionado}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(producto)
        });

        limpiar();
        cargar();
    }

    // DELETE
    async function eliminar() {
        if (!productoSeleccionado) {
            alert("Selecciona un producto");
            return;
        }

        if (confirm("¿Eliminar producto?")) {
            await fetch(`/api/productos/${productoSeleccionado}`, {
                method: "DELETE"
            });
            limpiar();
            cargar();
        }
    }

    cargar();
</script>

</body>
</html>
