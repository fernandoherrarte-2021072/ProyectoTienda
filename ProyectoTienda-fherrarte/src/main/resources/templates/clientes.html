<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Clientes | Sistema de Ventas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/entidades.css?v=2.2}">

    <style>
        /* Estilos adicionales para asegurar que el Script y la Tabla luzcan bien */
        .selected-row {
            background-color: #2d3a54 !important;
            border-color: var(--accent-blue) !important;
            transform: scale(1.01);
        }

        tr {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestión de Clientes</h2>

    <div class="form">
        <input id="dpiCliente" type="number" placeholder="DPI">
        <input id="nombreCliente" type="text" placeholder="Nombre">
        <input id="apellidoCliente" type="text" placeholder="Apellido">
        <input id="direccion" type="text" placeholder="Dirección">
        <input id="estado" type="number" placeholder="Estado">

        <div class="form-actions">
            <button class="btn-add" onclick="agregar()">Agregar</button>
            <button class="btn-edit" onclick="editar()">Editar</button>
            <button class="btn-delete" onclick="eliminar()">Eliminar</button>
            <button type="button" onclick="limpiar()">Limpiar</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>DPI</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Dirección</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>

    <div style="margin-top: 40px; text-align: center;">
        <a th:href="@{/home}" style="color: #3b82f6; text-decoration: none; font-weight: 700; font-family: 'Plus Jakarta Sans';">
            ← Volver al Panel Principal
        </a>
    </div>
</div>

<script>
    let dpiSeleccionado = null;

    // --- Listar Clientes ---
    async function cargar() {
        try {
            const res = await fetch("/api/clientes");
            const data = await res.json();

            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(c => {
                const tr = document.createElement("tr");
                tr.style.cursor = "pointer";
                // Usamos dataset para guardar el ID de forma limpia
                tr.setAttribute("onclick", `seleccionar(this, '${c.dpiCliente}', '${c.nombreCliente}', '${c.apellidoCliente}', '${c.direccion}', '${c.estado}')`);

                tr.innerHTML = `
                    <td>${c.dpiCliente}</td>
                    <td>${c.nombreCliente}</td>
                    <td>${c.apellidoCliente}</td>
                    <td>${c.direccion}</td>
                    <td><span class="status-badge">${c.estado}</span></td>
                `;
                tabla.appendChild(tr);
            });
        } catch (error) {
            console.error("Error al cargar clientes:", error);
        }
    }

    // --- Seleccionar Fila ---
    function seleccionar(elemento, dpi, nombre, apellido, direccion, estado) {
        // Quitar clase de selección a otras filas
        document.querySelectorAll("tr").forEach(row => row.classList.remove("selected-row"));

        // Añadir clase a la fila actual
        elemento.classList.add("selected-row");

        dpiSeleccionado = dpi;
        document.getElementById("dpiCliente").value = dpi;
        document.getElementById("nombreCliente").value = nombre;
        document.getElementById("apellidoCliente").value = apellido;
        document.getElementById("direccion").value = direccion;
        document.getElementById("estado").value = estado;
    }

    // --- Limpiar formulario ---
    function limpiar() {
        dpiSeleccionado = null;
        document.querySelectorAll(".form input").forEach(i => i.value = "");
        document.querySelectorAll("tr").forEach(row => row.classList.remove("selected-row"));
    }

    // --- agregar ---
    async function agregar() {
        const cliente = {
            dpiCliente: document.getElementById("dpiCliente").value,
            nombreCliente: document.getElementById("nombreCliente").value,
            apellidoCliente: document.getElementById("apellidoCliente").value,
            direccion: document.getElementById("direccion").value,
            estado: document.getElementById("estado").value
        };

        if(!cliente.dpiCliente || !cliente.nombreCliente) {
            alert("Por favor completa los campos principales");
            return;
        }

        await fetch("/api/clientes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });

        limpiar();
        cargar();
    }

    // --- editar ---
    async function editar() {
        if (!dpiSeleccionado) {
            alert("Selecciona un cliente de la tabla para editar");
            return;
        }

        const cliente = {
            dpiCliente: dpiSeleccionado,
            nombreCliente: document.getElementById("nombreCliente").value,
            apellidoCliente: document.getElementById("apellidoCliente").value,
            direccion: document.getElementById("direccion").value,
            estado: document.getElementById("estado").value
        };

        await fetch(`/api/clientes/${dpiSeleccionado}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });

        limpiar();
        cargar();
    }

    // --- eliminar ---
    async function eliminar() {
        if (!dpiSeleccionado) {
            alert("Selecciona un cliente para eliminar");
            return;
        }

        if (confirm(`¿Estás seguro de eliminar al cliente con DPI: ${dpiSeleccionado}?`)) {
            await fetch(`/api/clientes/${dpiSeleccionado}`, {
                method: "DELETE"
            });
            limpiar();
            cargar();
        }
    }

    // Carga inicial al abrir la página
    cargar();
</script>

</body>
</html>
