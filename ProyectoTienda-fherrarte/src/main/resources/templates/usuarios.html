<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>
  <link rel="stylesheet" href="/css/entidades.css">
</head>
<body>

<div class="container">

  <h2>Gestión de Usuarios</h2>

  <div class="form">
    <input id="codigoUsuario" type="number" placeholder="Código (solo editar)" readonly>
    <input id="usuario" type="text" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <input id="email" type="email" placeholder="Email">
    <input id="rol" type="text" placeholder="Rol (ADMIN / VENDEDOR)">
    <input id="estado" type="number" placeholder="Estado (1=Activo)">

    <div style="margin-top:10px">
      <button class="btn-add" onclick="agregar()">Agregar</button>
      <button class="btn-edit" onclick="editar()">Editar</button>
      <button class="btn-delete" onclick="eliminar()">Eliminar</button>
      <button onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <hr>

  <table>
    <thead>
    <tr>
      <th>Código</th>
      <th>Usuario</th>
      <th>Email</th>
      <th>Rol</th>
      <th>Estado</th>
    </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <br>
  <a href="/home">Volver al Home</a>

</div>

<script>
  let usuarioSeleccionado = null;

  // LISTAR
  async function cargar() {
      const res = await fetch("/api/usuarios");
      const data = await res.json();

      const tabla = document.getElementById("tabla");
      tabla.innerHTML = "";

      data.forEach(u => {
          tabla.innerHTML += `
              <tr onclick="seleccionar(${u.codigoUsuario},
                                       '${u.username}',
                                       '${u.password}',
                                       '${u.email}',
                                       '${u.rol}',
                                       ${u.estado})"
                  style="cursor:pointer">
                  <td>${u.codigoUsuario}</td>
                  <td>${u.username}</td>
                  <td>${u.email}</td>
                  <td>${u.rol}</td>
                  <td>${u.estado == 1 ? 'Activo' : 'Inactivo'}</td>
              </tr>
          `;
      });
  }

  function seleccionar(id, username, password, email, rol, estado) {
      usuarioSeleccionado = id;
      document.getElementById("codigoUsuario").value = id;
      document.getElementById("usuario").value = username;
      document.getElementById("password").value = password;
      document.getElementById("email").value = email;
      document.getElementById("rol").value = rol;
      document.getElementById("estado").value = estado;
  }

  function limpiar() {
      usuarioSeleccionado = null;
      document.querySelectorAll(".form input").forEach(i => i.value = "");
  }

  // POST (CREAR)
  async function agregar() {
      const user = {
          username: document.getElementById("usuario").value,
          password: document.getElementById("password").value,
          email: document.getElementById("email").value,
          rol: document.getElementById("rol").value,
          estado: parseInt(document.getElementById("estado").value)
      };

      await fetch("/api/usuarios", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
      });

      limpiar();
      cargar();
  }

  // PUT (ACTUALIZAR)
  async function editar() {
      if (!usuarioSeleccionado) {
          alert("Selecciona un usuario");
          return;
      }

      const user = {
          codigoUsuario: usuarioSeleccionado,
          username: document.getElementById("usuario").value,
          password: document.getElementById("password").value,
          email: document.getElementById("email").value,
          rol: document.getElementById("rol").value,
          estado: parseInt(document.getElementById("estado").value)
      };

      await fetch(`/api/usuarios/${usuarioSeleccionado}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
      });

      limpiar();
      cargar();
  }

  // DELETE (ELIMINAR)
  async function eliminar() {
      if (!usuarioSeleccionado) {
          alert("Selecciona un usuario");
          return;
      }

      if (confirm("¿Eliminar usuario?")) {
          await fetch(`/api/usuarios/${usuarioSeleccionado}`, {
              method: "DELETE"
          });
          limpiar();
          cargar();
      }
  }

  cargar();
</script>

</body>
</html>
