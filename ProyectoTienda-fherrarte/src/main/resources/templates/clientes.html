<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link rel="stylesheet" th:href="@{/css/entidades.css}">
</head>
<body>

<div class="container">

    <h2>Gestión de Clientes</h2>

    <div class="form">
        <input id="dpiCliente" type="number" placeholder="DPI">
        <input id="nombreCliente" type="text" placeholder="Nombre">
        <input id="apellidoCliente" type="text" placeholder="Apellido">
        <input id="direccion" type="text" placeholder="Dirección">
        <input id="estado" type="number" placeholder="Estado">

        <div style="margin-top: 10px;">
            <button class="btn-add" onclick="agregar()">Agregar</button>
            <button class="btn-edit" onclick="editar()">Editar</button>
            <button class="btn-delete" onclick="eliminar()">Eliminar</button>
            <button onclick="limpiar()">Limpiar</button>
        </div>
    </div>

    <hr>

    <table>
        <thead>
        <tr>
            <th>DPI</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Dirección</th>
            <th>Estado</th>
        </tr>
        </thead>
        <tbody id="tabla">
        </tbody>
    </table>

    <br>
    <a th:href="@{/home}">Volver al Home</a>

</div>

<script>
    let dpiSeleccionado = null;

    // LISTAR
    async function cargar() {
        try {
            const res = await fetch("/api/clientes");
            const data = await res.json();

            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(c => {
                // Se agregaron comillas escapadas para los strings en la función seleccionar
                tabla.innerHTML += `
                    <tr onclick="seleccionar('${c.dpiCliente}', '${c.nombreCliente}', '${c.apellidoCliente}', '${c.direccion}', '${c.estado}')" style="cursor:pointer">
                        <td>${c.dpiCliente}</td>
                        <td>${c.nombreCliente}</td>
                        <td>${c.apellidoCliente}</td>
                        <td>${c.direccion}</td>
                        <td>${c.estado}</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Error al cargar clientes:", error);
        }
    }

    function seleccionar(dpi, nombre, apellido, direccion, estado) {
        dpiSeleccionado = dpi;
        document.getElementById("dpiCliente").value = dpi;
        document.getElementById("nombreCliente").value = nombre;
        document.getElementById("apellidoCliente").value = apellido;
        document.getElementById("direccion").value = direccion;
        document.getElementById("estado").value = estado;
    }

    function limpiar() {
        dpiSeleccionado = null;
        document.querySelectorAll(".form input").forEach(i => i.value = "");
    }

    // POST
    async function agregar() {
        const cliente = {
            dpiCliente: document.getElementById("dpiCliente").value,
            nombreCliente: document.getElementById("nombreCliente").value,
            apellidoCliente: document.getElementById("apellidoCliente").value,
            direccion: document.getElementById("direccion").value,
            estado: document.getElementById("estado").value
        };

        await fetch("/api/clientes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });

        limpiar();
        cargar();
    }

    // PUT
    async function editar() {
        if (!dpiSeleccionado) {
            alert("Selecciona un cliente de la tabla");
            return;
        }

        const cliente = {
            dpiCliente: dpiSeleccionado,
            nombreCliente: document.getElementById("nombreCliente").value,
            apellidoCliente: document.getElementById("apellidoCliente").value,
            direccion: document.getElementById("direccion").value,
            estado: document.getElementById("estado").value
        };

        await fetch(`/api/clientes/${dpiSeleccionado}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });

        limpiar();
        cargar();
    }

    // DELETE
    async function eliminar() {
        if (!dpiSeleccionado) {
            alert("Selecciona un cliente");
            return;
        }

        if (confirm("¿Seguro que deseas eliminar este cliente?")) {
            await fetch(`/api/clientes/${dpiSeleccionado}`, {
                method: "DELETE"
            });
            limpiar();
            cargar();
        }
    }

    // Carga inicial
    cargar();
</script>

</body>
</html>
